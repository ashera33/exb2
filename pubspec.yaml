name: examenb2
description: Sistema de captura y validación de actas electorales

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 🔥 Appwrite backend
  appwrite: ^25.2.0

  # 📸 Cámara y galería
  image_picker: ^1.1.2
  camera: ^0.10.5+9

  # 🧠 Procesamiento de imagen (borrosidad / análisis)
  image: ^4.1.7

  # 🎨 UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1

  # 🧭 Estado y navegación
  provider: ^6.1.2
  go_router: ^14.0.2
  geolocator: ^13.0.1

  # 🧰 Utilidades
  permission_handler: ^11.3.1
  uuid: ^4.4.2
  intl: ^0.19.0
  shared_preferences: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/